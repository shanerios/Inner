<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Entering Inner…</title>

  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(1100px 700px at 50% 14%, rgba(123,108,255,0.10), transparent 58%),
        linear-gradient(180deg, #08081b 0%, #0d0c1f 42%, #171a30 100%);
      color: #f5f3ff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      text-align: center;
      padding: 28px;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 22% 18%, rgba(161,140,255,0.08), transparent 18%),
        radial-gradient(circle at 78% 24%, rgba(161,140,255,0.06), transparent 16%),
        radial-gradient(circle at 54% 72%, rgba(161,140,255,0.05), transparent 20%);
      opacity: 0.95;
    }

    .orb-shell {
      position: relative;
      width: 184px;
      margin: 0 auto 10px auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wordmark {
      display: block;
      width: min(320px, 74vw);
      margin: 0 auto 12px auto;
      user-select: none;
      pointer-events: none;
      filter: drop-shadow(0 0 12px rgba(255,255,255,0.08)) drop-shadow(0 0 24px rgba(161,140,255,0.08));
    }

    .orb-image {
      display: block;
      width: 100%;
      height: auto;
      animation: orb-breathe 6.6s ease-in-out infinite;
      transform-origin: center;
      filter: drop-shadow(0 0 36px rgba(92, 128, 255, 0.14)) drop-shadow(0 0 90px rgba(161, 140, 255, 0.14));
      user-select: none;
      pointer-events: none;
    }

    @keyframes orb-breathe {
      0%, 100% {
        transform: scale(0.95);
      }
      50% {
        transform: scale(1.2);
      }
    }

    h1 {
      margin: 0;
      font-family: 'CalSans', 'Inter', sans-serif;
      font-size: clamp(1.7rem, 5vw, 2.3rem);
      line-height: 1.05;
      color: rgba(245, 243, 255, 0.98);
    }

    .subtitle {
      margin: 14px auto 0 auto;
      max-width: 460px;
      font-size: 1rem;
      line-height: 1.5;
      color: rgba(235, 232, 255, 0.76);
    }

    .status {
      margin: 18px auto 0 auto;
      font-size: 0.92rem;
      color: rgba(161, 140, 255, 0.88);
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .content {
      width: min(100%, 620px);
      margin: 0 auto;
    }

    @media (min-width: 768px) {
      .wordmark {
        width: min(160px, 20vw);
        margin: -30px auto 10px auto;
        opacity: 0.88;
      }

      .orb-shell {
        margin-bottom: -30px;
      }

      .btn-group {
        width: min(100%, 360px);
      }

      .btn {
        padding: 14px 16px;
      }
    }

    .btn-group {
      display: grid;
      gap: 12px;
      width: min(100%, 440px);
      margin: 22px auto 0 auto;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 18px;
      border-radius: 14px;
      border: 1px solid rgba(161, 140, 255, 0.26);
      background: linear-gradient(135deg, rgba(154, 134, 245, 0.42), rgba(122, 109, 224, 0.34));
      color: white;
      font-size: 1rem;
      font-weight: 600;
      box-shadow: 0 4px 14px rgba(161, 140, 255, 0.22);
      backdrop-filter: blur(8px);
      text-decoration: none;
      cursor: pointer;
      transition: background 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease, transform 0.25s ease;
      min-width: 190px;
      box-sizing: border-box;
    }

    .btn:hover {
      background: linear-gradient(135deg, rgba(168, 150, 249, 0.5), rgba(137, 124, 232, 0.42));
      border-color: rgba(183, 166, 255, 0.34);
      box-shadow: 0 6px 18px rgba(161, 140, 255, 0.26);
      transform: translateY(-1px);
    }

    .btn img {
      width: 16px;
      height: 16px;
      opacity: 0.78;
      transform: translateY(-1px);
    }

    .helper {
      margin: 18px auto 0 auto;
      font-size: 0.82rem;
      line-height: 1.4;
      color: rgba(210, 205, 240, 0.56);
    }

    @media (max-width: 480px) {
      body {
        padding: 18px;
      }

      .content {
        width: 100%;
      }

      .orb-shell {
        width: 150px;
        margin-bottom: 6px;
      }

      .subtitle {
        font-size: 0.92rem;
        line-height: 1.42;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="content">
    <div class="orb-shell" aria-hidden="true">
      <img class="orb-image" src="https://raw.githubusercontent.com/shanerios/Inner/main/inner_orb.png" alt="" />
    </div>

    <img class="wordmark" src="https://raw.githubusercontent.com/shanerios/Inner/main/wordmark.svg" alt="Inner" />
    <p class="subtitle">You’re being guided to the right store for your device.<br>If nothing happens, choose your path below.</p>
    <p class="status">Now available on iOS and Android.</p>

    <div class="btn-group">
      <a id="ios" class="btn" href="https://apps.apple.com/us/app/inner-official/id6755213270">
        <img src="https://img.icons8.com/?size=100&id=30840&format=png&color=FFFFFF" alt="" />
        Download on iOS
      </a>
      <a id="android" class="btn" href="https://play.google.com/store/apps/details?id=com.getinner.app">
        <img src="https://img.icons8.com/?size=100&id=11138&format=png&color=FFFFFF" alt="" />
        Get it on Android
      </a>
    </div>

    <p class="helper">If you’re on desktop, use the buttons above to choose your store manually.</p>
  </div>

  <script>
    const ios = "https://apps.apple.com/us/app/inner-official/id6755213270";
    const android = "https://play.google.com/store/apps/details?id=com.getinner.app";
    const ua = navigator.userAgent || navigator.vendor || window.opera || "";

    setTimeout(() => {
      if (/android/i.test(ua)) {
        window.location.href = android;
      } else if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {
        window.location.href = ios;
      }
    }, 450);
  </script>
</body>
</html>
