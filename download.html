<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Entering Inner…</title>

  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(1100px 700px at 50% 14%, rgba(123,108,255,0.10), transparent 58%),
        linear-gradient(180deg, #08081b 0%, #0d0c1f 42%, #171a30 100%);
      color: #f5f3ff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      text-align: center;
      padding: 28px;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 22% 18%, rgba(161,140,255,0.08), transparent 18%),
        radial-gradient(circle at 78% 24%, rgba(161,140,255,0.06), transparent 16%),
        radial-gradient(circle at 54% 72%, rgba(161,140,255,0.05), transparent 20%);
      opacity: 0.95;
    }

    .wrap {
      position: relative;
      width: min(100%, 620px);
      padding: 40px 28px 28px 28px;
      border-radius: 28px;
      border: 1px solid rgba(120, 103, 208, 0.22);
      background: linear-gradient(180deg, rgba(19, 18, 43, 0.70), rgba(25, 24, 54, 0.62));
      box-shadow:
        0 20px 60px rgba(0, 0, 0, 0.34),
        inset 0 0 0 1px rgba(161, 140, 255, 0.03);
      backdrop-filter: blur(16px);
      overflow: hidden;
    }

    .wrap::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(720px 280px at 50% 0%, rgba(161, 140, 255, 0.08), transparent 60%);
      opacity: 0.9;
    }

    .orb-shell {
      position: relative;
      width: 184px;
      height: 184px;
      margin: 0 auto 12px auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .breathing-orb {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background:
        radial-gradient(circle at 62% 24%, rgba(202, 220, 255, 0.98) 0%, rgba(164, 196, 255, 0.58) 12%, rgba(55, 108, 214, 0.18) 29%, rgba(9, 19, 54, 0.02) 44%, transparent 54%),
        radial-gradient(circle at 50% 50%, rgba(0, 0, 0, 0.78) 0%, rgba(4, 14, 38, 0.78) 30%, rgba(15, 39, 88, 0.52) 54%, rgba(42, 68, 125, 0.18) 66%, rgba(150, 140, 255, 0.08) 82%, rgba(150, 140, 255, 0.02) 100%);
      box-shadow:
        0 0 40px rgba(92, 128, 255, 0.12),
        0 0 100px rgba(161, 140, 255, 0.12),
        inset 0 0 36px rgba(255, 255, 255, 0.04),
        inset 0 -22px 44px rgba(0, 0, 0, 0.35);
      animation: orb-breathe 6.6s ease-in-out infinite;
      transform-origin: center;
    }

    .breathing-orb::after {
      content: "";
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 1px solid rgba(161, 140, 255, 0.10);
      filter: blur(2px);
      opacity: 0.5;
    }

    @keyframes orb-breathe {
      0%, 100% {
        transform: scale(0.985);
        box-shadow:
          0 0 34px rgba(92, 128, 255, 0.10),
          0 0 88px rgba(161, 140, 255, 0.10),
          inset 0 0 34px rgba(255, 255, 255, 0.035),
          inset 0 -20px 42px rgba(0, 0, 0, 0.34);
      }
      50% {
        transform: scale(1.03);
        box-shadow:
          0 0 50px rgba(92, 128, 255, 0.14),
          0 0 120px rgba(161, 140, 255, 0.16),
          inset 0 0 38px rgba(255, 255, 255, 0.05),
          inset 0 -24px 48px rgba(0, 0, 0, 0.36);
      }
    }

    .wordmark {
      margin: 0 auto 8px auto;
      font-family: 'CalSans', 'Inter', sans-serif;
      font-size: clamp(3rem, 9vw, 4.4rem);
      font-weight: 700;
      line-height: 0.95;
      letter-spacing: -0.04em;
      color: #f4f1ff;
      text-shadow:
        0 0 10px rgba(255,255,255,0.16),
        0 0 28px rgba(161,140,255,0.10);
    }

    h1 {
      margin: 0;
      font-family: 'CalSans', 'Inter', sans-serif;
      font-size: clamp(1.7rem, 5vw, 2.3rem);
      line-height: 1.05;
      color: rgba(245, 243, 255, 0.98);
    }

    .subtitle {
      margin: 14px auto 0 auto;
      max-width: 460px;
      font-size: 1rem;
      line-height: 1.5;
      color: rgba(235, 232, 255, 0.76);
    }

    .status {
      margin: 18px auto 0 auto;
      font-size: 0.92rem;
      color: rgba(161, 140, 255, 0.88);
    }

    .btn-group {
      display: grid;
      gap: 12px;
      width: min(100%, 440px);
      margin: 22px auto 0 auto;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 18px;
      border-radius: 14px;
      border: 1px solid rgba(161, 140, 255, 0.26);
      background: linear-gradient(135deg, rgba(154, 134, 245, 0.42), rgba(122, 109, 224, 0.34));
      color: white;
      font-size: 1rem;
      font-weight: 600;
      box-shadow: 0 4px 14px rgba(161, 140, 255, 0.22);
      backdrop-filter: blur(8px);
      text-decoration: none;
      cursor: pointer;
      transition: background 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease, transform 0.25s ease;
      min-width: 190px;
      box-sizing: border-box;
    }

    .btn:hover {
      background: linear-gradient(135deg, rgba(168, 150, 249, 0.5), rgba(137, 124, 232, 0.42));
      border-color: rgba(183, 166, 255, 0.34);
      box-shadow: 0 6px 18px rgba(161, 140, 255, 0.26);
      transform: translateY(-1px);
    }

    .btn img {
      width: 16px;
      height: 16px;
      opacity: 0.78;
      transform: translateY(-1px);
    }

    .helper {
      margin: 18px auto 0 auto;
      font-size: 0.82rem;
      line-height: 1.4;
      color: rgba(210, 205, 240, 0.56);
    }

    @media (max-width: 480px) {
      body {
        padding: 18px;
      }

      .wrap {
        padding: 28px 18px 22px 18px;
        border-radius: 22px;
      }

      .orb-shell {
        width: 150px;
        height: 150px;
        margin-bottom: 8px;
      }

      .subtitle {
        font-size: 0.92rem;
        line-height: 1.42;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="orb-shell" aria-hidden="true">
      <div class="breathing-orb"></div>
    </div>

    <div class="wordmark">inner</div>
    <h1>Entering Inner…</h1>
    <p class="subtitle">You’re being guided to the right store for your device. If nothing happens, choose your path below.</p>
    <p class="status">Now available on iOS and Android.</p>

    <div class="btn-group">
      <a id="ios" class="btn" href="https://apps.apple.com/us/app/inner-official/id6755213270">
        <img src="https://img.icons8.com/?size=100&id=30840&format=png&color=FFFFFF" alt="" />
        Download on iOS
      </a>
      <a id="android" class="btn" href="https://play.google.com/store/apps/details?id=com.getinner.app">
        <img src="https://img.icons8.com/?size=100&id=11138&format=png&color=FFFFFF" alt="" />
        Get it on Android
      </a>
    </div>

    <p class="helper">If you’re on desktop, use the buttons above to choose your store manually.</p>
  </div>

  <script>
    const ios = "https://apps.apple.com/us/app/inner-official/id6755213270";
    const android = "https://play.google.com/store/apps/details?id=com.getinner.app";
    const ua = navigator.userAgent || navigator.vendor || window.opera || "";

    setTimeout(() => {
      if (/android/i.test(ua)) {
        window.location.href = android;
      } else if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {
        window.location.href = ios;
      }
    }, 450);
  </script>
</body>
</html>
